if(isTouch){
  document.getElementById('myChart').addEventListener('click', function(e){
    const pts = chart.getElementsAtEventForMode(e,'index',{intersect:false},true);
    if(!pts.length) return;
    const idx = pts[0].index;
    let html = '<div class="tp-date">'+labels[idx]+'</div>';
    datasets.forEach(ds => {
      const val = ds.data[idx];
      if(val===null||val===undefined) return;
      const color = ds.borderColor||'#888';
      if(ds.type==='bar') html += '<div class="tp-row"><span class="tp-dot" style="background:#B5D4F4;border:1px solid #378ADD;border-radius:2px;"></span><span>合計数量: '+val.toFixed(1)+'t</span></div>';

    document.getElementById('tp-content').innerHTML = html;
    document.getElementById('touch-panel').style.display = 'block';
  });
}
function setMode(mode){
  const outer = document.getElementById('chart-outer');
  const container = document.getElementById('chart-container');
  document.getElementById('btn-full').classList.toggle('active', mode==='full');
  document.getElementById('btn-scroll').classList.toggle('active', mode==='scroll');
  if(mode==='scroll'){
    outer.style.overflowX='auto';
    container.style.width=Math.max(labels.length*28,600)+'px';
  }else{
    outer.style.overflowX='';
    container.style.width='';
  }
  chart.resize();
