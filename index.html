<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>石巻魚市場 ギンザケ日計データ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; color: #333; font-size: 16px; }

  #header { position: fixed; top: 0; left: 0; right: 0; background: #1a73e8; color: white; z-index: 100; padding: 12px 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  #header-title { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
  #current-date { font-size: 28px; font-weight: bold; margin-bottom: 10px; line-height: 1.1; }
  #btn-row, #btn-row-2 { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn { border: none; border-radius: 10px; padding: 12px 6px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; min-height: 48px; }
  .btn-nav { background: rgba(255,255,255,0.25); color: white; }
  .btn-today { background: white; color: #1a73e8; }
  .btn-cal-wide { background: rgba(255,255,255,0.15); color: white; border: 2px solid #e53935; border-radius: 10px; padding: 10px 6px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; min-height: 46px; }
  .btn-toggle { background: #fbbc04; color: #333; border: none; border-radius: 10px; padding: 10px 6px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; min-height: 46px; }

  #cal-panel { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  #cal-panel.open { max-height: 200px; padding: 8px 0 0; }
  #cal-inner { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  #date-input { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 18px; background: white; color: #333; }
  #cal-btn-row { display: flex; gap: 10px; }
  #btn-cal-ok { flex: 1; background: #fbbc04; color: #333; border: none; border-radius: 8px; padding: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
  #btn-cal-cancel { flex: 0.4; background: rgba(255,255,255,0.25); color: white; border: none; border-radius: 8px; padding: 10px; font-size: 17px; cursor: pointer; }

  #content { padding: 14px; }

  .year-block { margin-bottom: 20px; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .year-header { background: #1a73e8; color: white; padding: 12px 16px; display: flex; align-items: baseline; gap: 12px; }
  .year-header-year { font-size: 22px; font-weight: bold; }
  .year-header-date { font-size: 16px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { background: #e8f0fe; }
  th { padding: 10px 6px; font-size: 13px; color: #555; text-align: right; border-bottom: 1px solid #ddd; white-space: nowrap; overflow: hidden; }
  th:first-child { text-align: left; }
  td { padding: 9px 6px; font-size: 17px; text-align: right; border-bottom: 1px solid #f0f0f0; white-space: nowrap; overflow: hidden; }
  td:first-child { text-align: left; }
  .row-total { font-weight: bold; background: #fff8e1; }
  .row-total td { border-top: 2px solid #ddd; border-bottom: none; font-size: 18px; padding: 10px 6px; }
  .row-subavg td { background: #f5f7fa; border-bottom: none; padding: 8px 6px; font-size: 15px; color: #1a73e8; }
  .price-diff { font-size: 12px; font-weight: normal; margin-left: 2px; }
  .price-diff.up { color: #1a73e8; }
  .price-diff.dn { color: #e65100; }
  .row-subavg .subavg-label { text-align: left; color: #666; font-size: 14px; font-weight: normal; white-space: normal; line-height: 1.3; }
  .row-subavg .subavg-note { font-size: 11px; color: #999; }
  .row-subavg .subavg-value { font-weight: bold; font-size: 16px; }

  .chart-block { margin-bottom: 20px; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .chart-header { background: #1a73e8; color: white; padding: 12px 16px; }
  .chart-header-year { font-size: 22px; font-weight: bold; }
  .chart-info { background: #f0f4ff; border-bottom: 2px solid #dde; padding: 12px 16px; min-height: 80px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .chart-info-hint { font-size: 14px; color: #aaa; text-align: center; }
  .chart-info-date { font-size: 18px; font-weight: bold; color: #1a73e8; }
  .chart-info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #dde; }
  .chart-info-label { font-size: 15px; color: #555; }
  .chart-info-value { font-size: 22px; font-weight: bold; color: #333; }
  .chart-wrap { padding: 12px; position: relative; height: 400px; }

  #loading { text-align: center; padding: 40px; color: #888; font-size: 18px; }
  #no-data { text-align: center; padding: 40px; color: #aaa; font-size: 18px; display: none; }
  .no-data-label { position: absolute; top: 0; bottom: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .no-data-label-text { writing-mode: vertical-rl; font-size: 15px; font-weight: bold; color: rgba(150,150,150,0.75); letter-spacing: 4px; }

  #btn-cum { position: absolute; top: 10px; right: 14px; background: rgba(255,255,255,0.22); color: white; border: none; border-radius: 8px; padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 5; }

  #cumulative-page { position: fixed; inset: 0; background: #f0f4f8; z-index: 200; overflow-y: auto; display: none; }
  #cum-header { position: sticky; top: 0; background: #1a73e8; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 10; }
  #cum-subtitle { font-size: 12px; opacity: 0.85; }
  #cum-title { font-size: 20px; font-weight: bold; line-height: 1.1; }
  #btn-cum-back { background: rgba(255,255,255,0.22); color: white; border: none; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
  #cum-content { padding: 14px; }

  .cum-card { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 16px; overflow: hidden; }
  .cum-card-head { padding: 12px 16px; font-size: 14px; color: #555; border-bottom: 1px solid #eee; }
  .cum-card-body { padding: 12px 16px; }

  .cum-season { padding: 10px 12px; border-radius: 10px; margin-bottom: 10px; }
  .cum-season.current { background: #e8f0fe; }
  .cum-season-top { display: flex; justify-content: space-between; align-items: baseline; }
  .cum-season-year { font-size: 15px; font-weight: bold; }
  .cum-season-price { font-size: 15px; font-weight: bold; }
  .cum-season.current .cum-season-year, .cum-season.current .cum-season-price { color: #1a73e8; }
  .cum-bar-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .cum-qty { font-size: 17px; font-weight: bold; min-width: 64px; }
  .cum-season.current .cum-qty { color: #1a73e8; }
  .cum-bar-track { flex: 1; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
  .cum-bar-fill { display: block; height: 100%; background: #c5cdd6; }
  .cum-season.current .cum-bar-track { background: #fff; }
  .cum-season.current .cum-bar-fill { background: #1a73e8; }
  .cum-delta { font-size: 12px; color: #1a73e8; margin-top: 6px; }

  .cum-detail-year { background: #1a73e8; color: white; padding: 10px 16px; font-size: 18px; font-weight: bold; }
  table.cum-month { width: 100%; border-collapse: collapse; table-layout: fixed; }
  table.cum-month th { text-align: right; padding: 8px 10px; font-size: 12px; color: #555; font-weight: normal; border-bottom: 1px solid #ddd; }
  table.cum-month th:first-child { text-align: left; }
  table.cum-month td { text-align: right; padding: 8px 10px; font-size: 15px; border-bottom: 1px solid #f2f2f2; }
  table.cum-month td:first-child { text-align: left; }
  table.cum-month tr.cum-total td { font-weight: bold; background: #fff8e1; border-top: 2px solid #ddd; border-bottom: none; }
  .cum-note { font-size: 11px; color: #aaa; padding: 6px 2px 0; }
  #cum-empty { text-align: center; color: #aaa; padding: 40px; font-size: 17px; }
</style>
</head>
<body>

<div id="header">
  <button id="btn-cum">📈 累計</button>
  <div id="header-title">石巻魚市場 ギンザケ日計データ</div>
  <div id="current-date">読み込み中...</div>
  <div id="btn-row">
    <button class="btn btn-nav" id="btn-prev">← 前日</button>
    <button class="btn btn-today" id="btn-today">本日</button>
    <button class="btn btn-nav" id="btn-next">翌日 →</button>
  </div>
  <div id="btn-row-2">
    <button class="btn-cal-wide" id="btn-cal">📅 日付を選んで移動</button>
    <button class="btn-toggle" id="btn-toggle">📊 グラフ表示</button>
  </div>
  <div id="cal-panel">
    <div id="cal-inner">
      <input type="date" id="date-input">
      <div id="cal-btn-row">
        <button id="btn-cal-ok">決定</button>
        <button id="btn-cal-cancel">✕</button>
      </div>
    </div>
  </div>
</div>

<div id="content">
  <div id="loading">読み込み中...</div>
  <div id="no-data">この日のデータはありません</div>
  <div id="data-area"></div>
  <div id="chart-area" style="display:none;"></div>
</div>

<div id="cumulative-page">
  <div id="cum-header">
    <div>
      <div id="cum-subtitle">石巻魚市場 ギンザケ</div>
      <div id="cum-title">水揚げ累計</div>
    </div>
    <button id="btn-cum-back">📋 リストへ戻る</button>
  </div>
  <div id="cum-content"></div>
</div>

<script>
var SHEET_ID   = '1tLvvP73GxPnJfdfX4_lctB1xOj_Hc7LroOSbaiTScC8';
var API_KEY    = 'AIzaSyDqpcvm9SXL069-FMKxZ9kHaYL_Cl8OWpQ';
var SHEET_NAME = 'データ';

var GRADE_ORDER = ['3.5k上','3k上','2.5k上','2k上','1.5k上','1k上','0.5k上','スレ','次品','合計'];
var GRADE_LINE_COLORS = { '3.5k上':'#1565c0','3k上':'#1e88e5','2.5k上':'#43a047','2k上':'#fb8c00','1.5k上':'#8e24aa','1k上':'#6d4c41' };
var GRADE_ORDER_CHART = ['3.5k上','3k上','2.5k上','2k上','1.5k上','1k上'];

// 主要規格平均から除外する規格（スレ・次品・0.5k上）
var EXCLUDE_FROM_MAIN = { '0.5k上':1, 'スレ':1, '次品':1 };

var currentDate = new Date();
var viewMode = 'list';
var chartInstances = [];
var allData = [];
var dataLoaded = false;

function formatDate(d) {
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}
function formatDateDisplay(d) {
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}
function formatDateForInput(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function formatNote(note) {
  if (note===null||note===undefined||note==='') return '—';
  var str=String(note).trim();
  if (str.indexOf('%')!==-1) return str;
  var num=parseFloat(str);
  if (isNaN(num)) return str;
  return num.toFixed(1)+'%';
}
// 平均単価の端数処理：金額÷数量 → 小数第二位以下切り捨て → 小数第一位を四捨五入
function priceRound(amount, qty) {
  if (!qty) return null;
  var raw = amount / qty;
  var oneDp = Math.floor(raw * 10) / 10;
  return Math.floor(oneDp + 0.5);
}
function adjustContentMargin() {
  document.getElementById('content').style.marginTop=(document.getElementById('header').offsetHeight+8)+'px';
}
function updateDateDisplay() {
  document.getElementById('current-date').textContent=formatDateDisplay(currentDate);
  document.getElementById('date-input').value=formatDateForInput(currentDate);
  setTimeout(adjustContentMargin,50);
}

function fetchAllData(callback) {
  if (dataLoaded) { callback(); return; }
  var num=function(v){ return parseFloat(String(v==null?'':v).replace(/,/g,''))||0; }; // カンマ区切り("7,015")も正しく数値化
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(SHEET_NAME+'!A:H')+'?key='+API_KEY;
  fetch(url).then(function(r){ return r.json(); }).then(function(json){
    var rows=json.values||[]; allData=[];
    for (var i=1;i<rows.length;i++) {
      var r=rows[i]; if(!r[0]) continue;
      allData.push({date:String(r[0]).trim(),grade:r[2]||'',qty:num(r[3]),amt:num(r[4]),price:num(r[5]),note:r[6]||''});
    }
    dataLoaded=true; callback();
  }).catch(function(){ document.getElementById('loading').textContent='データの読み込みに失敗しました'; });
}

function getViewData(dateStr) {
  var parts=dateStr.split('/'),tY=Number(parts[0]),tM=Number(parts[1]),tD=Number(parts[2]);
  var today=new Date(); today.setHours(0,0,0,0);
  var yearSet=new Set(); allData.forEach(function(r){ yearSet.add(new Date(r.date).getFullYear()); });
  var tDate=new Date(tY,tM-1,tD);
  var years=Array.from(yearSet).filter(function(y){ return y<tY||(y===tY&&tDate<=today); }).sort(function(a,b){ return b-a; });
  var map={};
  allData.forEach(function(r){
    var d=new Date(r.date);
    if(d.getMonth()+1===tM&&d.getDate()===tD){ var y=d.getFullYear(); if(!map[y]) map[y]=[]; map[y].push(r); }
  });
  Object.keys(map).forEach(function(y){ map[y].sort(function(a,b){ return GRADE_ORDER.indexOf(a.grade)-GRADE_ORDER.indexOf(b.grade); }); });
  return years.map(function(y){ return {year:y,noData:!map[y],rows:map[y]||[]}; });
}

function getChartData(dateStr) {
  var parts=dateStr.split('/'),tY=Number(parts[0]),tM=Number(parts[1]),tD=Number(parts[2]);
  var today=new Date(); today.setHours(0,0,0,0);
  var dateMap={};
  allData.forEach(function(r){
    var d=new Date(r.date);
    var key=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    if(!dateMap[key]) dateMap[key]={qty:null,price:null,gradePrices:{}};
    if(r.grade==='合計'){dateMap[key].qty=r.qty;dateMap[key].price=r.price;}
    else if(GRADE_ORDER_CHART.indexOf(r.grade)!==-1) dateMap[key].gradePrices[r.grade]=r.price;
  });
  var yearSet=new Set(); allData.forEach(function(r){ yearSet.add(new Date(r.date).getFullYear()); });
  var tDate=new Date(tY,tM-1,tD);
  var years=Array.from(yearSet).filter(function(y){ return y<tY||(y===tY&&tDate<=today); }).sort(function(a,b){ return b-a; });
  return years.map(function(year){
    var cDate=new Date(year,tM-1,tD),points=[];
    for(var off=-3;off<=3;off++){
      var d=new Date(cDate); d.setDate(d.getDate()+off);
      var key=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
      var label=(d.getMonth()+1)+'/'+d.getDate();
      if(new Date(d.getFullYear(),d.getMonth(),d.getDate())>today) continue;
      if(dateMap[key]&&dateMap[key].qty!==null) points.push({label:label,qty:dateMap[key].qty,price:dateMap[key].price,gradePrices:dateMap[key].gradePrices,isCenter:off===0,noData:false});
      else points.push({label:label,qty:0,price:0,gradePrices:{},isCenter:off===0,noData:true});
    }
    return {year:year,points:points};
  }).filter(function(y){ return y.points.length>0; });
}

function loadData() {
  document.getElementById('loading').style.display='block';
  document.getElementById('no-data').style.display='none';
  document.getElementById('data-area').innerHTML='';
  document.getElementById('chart-area').innerHTML='';
  destroyCharts(); updateDateDisplay();
  fetchAllData(function(){
    document.getElementById('loading').style.display='none';
    if(viewMode==='list') renderData(getViewData(formatDate(currentDate)));
    else renderCharts(getChartData(formatDate(currentDate)));
  });
}

// 指定年・指定日付より前で直近の水揚げ日の規格別単価マップを返す
function getPrevDayPrices(year, dateStr) {
  // dateStr = 'YYYY/MM/DD'
  var targetTs = new Date(dateStr).getTime();
  // その年の、dateStrより前の日付を降順で探す
  var candidates = [];
  allData.forEach(function(r) {
    var d = new Date(r.date);
    if (d.getFullYear() !== year) return;
    if (d.getTime() < targetTs && r.grade !== '合計') return; // 合計行は後でまとめる
    if (d.getTime() < targetTs) candidates.push(r);
  });
  if (candidates.length === 0) return null;
  // 最も新しい日付を探す
  var maxTs = 0;
  candidates.forEach(function(r) { var t=new Date(r.date).getTime(); if(t>maxTs) maxTs=t; });
  // その日の規格→単価マップを作る
  var map = {};
  candidates.forEach(function(r) {
    if (new Date(r.date).getTime() === maxTs) map[r.grade] = Number(r.price);
  });
  return Object.keys(map).length > 0 ? map : null;
}

// 前日比HTMLを生成（変化なしは空文字）
function diffHtml(current, prev) {
  if (prev === undefined || prev === null) return '';
  var diff = current - prev;
  if (diff === 0) return '';
  if (diff > 0) {
    return '<span class="price-diff up">（↑'+diff+'）</span>';
  } else {
    return '<span class="price-diff dn">（↓'+Math.abs(diff)+'）</span>';
  }
}

function renderData(result) {
  var area=document.getElementById('data-area');
  area.innerHTML=''; area.style.display='block';
  document.getElementById('chart-area').style.display='none';
  if(!result||result.length===0){document.getElementById('no-data').style.display='block';return;}
  var month=currentDate.getMonth()+1,day=currentDate.getDate();
  var dateStr=formatDate(currentDate);
  result.forEach(function(yb){
    var block=document.createElement('div'); block.className='year-block';
    if(yb.noData){
      block.innerHTML='<div class="year-header"><span class="year-header-year">'+yb.year+'年</span><span class="year-header-date">'+month+'月'+day+'日</span></div><div style="padding:20px;color:#aaa;text-align:center;font-size:17px;">水揚げなし</div>';
    } else {
      var rows='';
      // 主要規格平均（スレ・次品・0.5k上を除く）を算出
      var mainQty=0, mainAmt=0;
      yb.rows.forEach(function(r){
        if(r.grade==='合計') return;
        if(EXCLUDE_FROM_MAIN[r.grade]) return;
        mainQty+=Number(r.qty)||0;
        mainAmt+=Number(r.amt)||0;
      });
      var mainAvg=(mainQty>0&&mainAmt>0)?priceRound(mainAmt,mainQty):null;
      // その年の直近前日の単価マップを取得
      var prevPrices = getPrevDayPrices(yb.year, dateStr);
      yb.rows.forEach(function(r){
        var isTotal=r.grade==='合計';
        var price=Number(r.price);
        var prevPrice = prevPrices ? prevPrices[r.grade] : null;
        var diff = (prevPrice!=null) ? diffHtml(price, prevPrice) : '';
        rows+='<tr class="'+(isTotal?'row-total':'')+'"><td>'+r.grade+'</td><td>'+Number(r.qty).toLocaleString()+'</td><td>'+price.toLocaleString()+diff+'</td><td>'+formatNote(r.note)+'</td></tr>';
        // 合計行のすぐ下に主要規格平均行を追加
        if(isTotal&&mainAvg!==null){
          rows+='<tr class="row-subavg"><td colspan="2" class="subavg-label">主要規格平均<span class="subavg-note">（スレ・次品・0.5k上を除く）</span></td><td class="subavg-value">'+Number(mainAvg).toLocaleString()+'</td><td></td></tr>';
        }
      });
      block.innerHTML='<div class="year-header"><span class="year-header-year">'+yb.year+'年</span><span class="year-header-date">'+month+'月'+day+'日</span></div><table><colgroup><col style="width:27%"><col style="width:28%"><col style="width:21%"><col style="width:24%"></colgroup><thead><tr><th>規格</th><th>数量</th><th>単価</th><th>構成比</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    area.appendChild(block);
  });
  setTimeout(adjustContentMargin,50);
}

function destroyCharts(){ chartInstances.forEach(function(c){c.destroy();}); chartInstances=[]; }

function makeLinePair(values,color,label,bw,pr){
  return [
    {type:'line',label:label,data:values,borderColor:color,backgroundColor:'transparent',borderWidth:bw,borderDash:[],pointRadius:pr,pointBackgroundColor:color,tension:0,spanGaps:false,yAxisID:'yPrice',order:1},
    {type:'line',label:label+'_dot',data:values,borderColor:color,backgroundColor:'transparent',borderWidth:Math.max(1,bw-1),borderDash:[6,4],pointRadius:0,tension:0,spanGaps:true,yAxisID:'yPrice',order:1}
  ];
}

function renderCharts(result){
  document.getElementById('data-area').style.display='none';
  var area=document.getElementById('chart-area'); area.innerHTML=''; area.style.display='block';
  destroyCharts();
  if(!result||result.length===0){document.getElementById('no-data').style.display='block';return;}
  var maxQty=0; result.forEach(function(yd){yd.points.forEach(function(p){if(p.qty>maxQty)maxQty=p.qty;});});
  var qtyMax=Math.ceil(maxQty*1.1/1000)*1000||1000;

  // 単価軸の共通スケール（表示中の全年・全規格の単価から自動算出）
  var minP=Infinity, maxP=-Infinity;
  result.forEach(function(yd){
    yd.points.forEach(function(p){
      if(p.noData) return;
      if(typeof p.price==='number' && p.price>0){ if(p.price<minP)minP=p.price; if(p.price>maxP)maxP=p.price; }
      if(p.gradePrices){
        for(var g in p.gradePrices){
          var v=p.gradePrices[g];
          if(typeof v==='number' && v>0){ if(v<minP)minP=v; if(v>maxP)maxP=v; }
        }
      }
    });
  });
  var priceLo, priceHi;
  if(minP===Infinity){ priceLo=600; priceHi=1000; }   // データなし時のフォールバック
  else {
    var pad=Math.max((maxP-minP)*0.04, 10);
    priceLo=minP-pad; priceHi=maxP+pad;
    if(priceHi-priceLo<100){ var c=(priceHi+priceLo)/2; priceLo=c-50; priceHi=c+50; }  // 動きが小さい日でも拡大しすぎない
    priceLo=Math.max(0, Math.floor(priceLo/10)*10);    // 10円単位に丸め
    priceHi=Math.ceil(priceHi/10)*10;
  }

  result.forEach(function(yd,yi){
    var block=document.createElement('div'); block.className='chart-block';
    var cid='chart-'+yd.year,iid='info-'+yd.year;
    block.innerHTML='<div class="chart-header"><span class="chart-header-year">'+yd.year+'年</span></div><div class="chart-info" id="'+iid+'"><div class="chart-info-hint">棒グラフをタップすると詳細表示</div></div><div class="chart-wrap" id="wrap-'+cid+'"><canvas id="'+cid+'"></canvas></div>';
    area.appendChild(block);

    var labels=yd.points.map(function(p){return p.label;});
    var qtys=yd.points.map(function(p){return p.qty;});
    var bgC=yd.points.map(function(p){return p.noData?'rgba(200,200,200,0.3)':p.isCenter?'rgba(251,188,4,0.85)':'rgba(26,115,232,0.55)';});
    var bdC=yd.points.map(function(p){return p.noData?'rgba(180,180,180,0.5)':p.isCenter?'#f9a825':'#1a73e8';});
    var pfl=yd.points.map(function(p){return p.noData?null:p.price;});
    var gradeLines=[];
    GRADE_ORDER_CHART.forEach(function(g){
      var vals=yd.points.map(function(p){return p.noData?null:(p.gradePrices&&p.gradePrices[g]!==undefined?p.gradePrices[g]:null);});
      if(vals.some(function(v){return v!==null;})) gradeLines.push({grade:g,values:vals,color:GRADE_LINE_COLORS[g]});
    });

    setTimeout(function(){
      (function(iid,points,cid,gradeLines){
        function showInfo(idx){
          if(idx<0||idx>=points.length) return;
          var p=points[idx],el=document.getElementById(iid),vc=p.isCenter?'#f9a825':'#333';
          if(p.noData) el.innerHTML='<div class="chart-info-date" style="color:#aaa;">'+p.label+'</div><div class="chart-info-row"><span class="chart-info-label">数量</span><span class="chart-info-value" style="color:#aaa;">0 kg（水揚げなし）</span></div>';
          else el.innerHTML='<div class="chart-info-date">'+p.label+(p.isCenter?'　★選択日':'')+'</div><div class="chart-info-row"><span class="chart-info-label">数量</span><span class="chart-info-value" style="color:'+vc+';">'+Number(p.qty).toLocaleString()+' kg</span></div><div class="chart-info-row"><span class="chart-info-label">平均単価</span><span class="chart-info-value" style="color:'+vc+';">'+Number(p.price).toLocaleString()+' 円/kg</span></div>';
        }
        var datasets=[{type:'bar',label:'数量(kg)',data:qtys,backgroundColor:bgC,borderColor:bdC,borderWidth:2,yAxisID:'yQty',order:2}];
        datasets=datasets.concat(makeLinePair(pfl,'#e53935','合計単価',2,5));
        gradeLines.forEach(function(gl){datasets=datasets.concat(makeLinePair(gl.values,gl.color,gl.grade,2,4));});
        var ctx=document.getElementById(cid).getContext('2d');
        var chart=new Chart(ctx,{
          data:{labels:labels,datasets:datasets},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{labels:{font:{size:12},boxWidth:16,padding:8,filter:function(i){return i.text.indexOf('_dot')===-1;}}},
              tooltip:{enabled:false}
            },
            onClick:function(e,els){if(els&&els.length>0)showInfo(els[0].index);},
            onHover:function(e,els){if(els&&els.length>0)showInfo(els[0].index);},
            scales:{
              x:{ticks:{font:{size:12}}},
              yQty:{type:'linear',position:'left',min:0,max:qtyMax,ticks:{font:{size:11},callback:function(v){return(v/1000).toFixed(0)+'t';}},grid:{drawOnChartArea:true}},
              yPrice:{type:'linear',position:'right',min:priceLo,max:priceHi,ticks:{font:{size:11},callback:function(v){return v+'円';}},grid:{drawOnChartArea:false}}
            }
          }
        });
        chartInstances.push(chart);
        if(points.some(function(p){return p.noData;})){
          var wEl=document.getElementById('wrap-'+cid);
          points.forEach(function(p,idx){
            if(!p.noData) return;
            setTimeout(function(){
              var ca=chart.chartArea;
              var xScale=chart.scales['x'];
              var cx=xScale.getPixelForTick(idx);
              var ow=(ca.right-ca.left)/points.length*0.8;
              var ov=document.createElement('div'); ov.className='no-data-label';
              ov.style.cssText='position:absolute;left:'+(cx-ow/2)+'px;width:'+ow+'px;top:'+ca.top+'px;height:'+(ca.bottom-ca.top)+'px;';
              ov.innerHTML='<span class="no-data-label-text">水揚げなし</span>';
              wEl.appendChild(ov);
            },200);
          });
        }
      })(iid,yd.points,cid,gradeLines);
    },yi*150);
  });
  setTimeout(adjustContentMargin,50);
}

// ===== 累計ページ =====
function tons(kg){ var t=kg/1000; return (Math.abs(t)>=100? Math.round(t).toLocaleString() : t.toFixed(1)); }

function computeCumulative() {
  var selMonth=currentDate.getMonth()+1, selDay=currentDate.getDate(), curYear=currentDate.getFullYear();
  var yearData={};
  allData.forEach(function(r){
    if(r.grade==='合計') return;                 // 合計行は二重計上になるため除外
    var d=new Date(r.date), y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
    if(y>curYear) return;
    if(m>selMonth) return;                        // 選択日と同じ月日までで切る
    if(m===selMonth && day>selDay) return;
    if(!yearData[y]) yearData[y]={qty:0,amt:0,months:{}};
    yearData[y].qty+=Number(r.qty)||0; yearData[y].amt+=Number(r.amt)||0;
    if(!yearData[y].months[m]) yearData[y].months[m]={qty:0,amt:0};
    yearData[y].months[m].qty+=Number(r.qty)||0; yearData[y].months[m].amt+=Number(r.amt)||0;
  });
  return Object.keys(yearData).map(Number).sort(function(a,b){return b-a;}).map(function(y){
    var yd=yearData[y];
    var months=Object.keys(yd.months).map(Number).sort(function(a,b){return a-b;}).map(function(m){
      return {month:m,qty:yd.months[m].qty,price:priceRound(yd.months[m].amt,yd.months[m].qty)};
    });
    return {year:y,qty:yd.qty,amt:yd.amt,price:priceRound(yd.amt,yd.qty),months:months,isCurrent:(y===curYear)};
  });
}

function renderCumulative() {
  var selMonth=currentDate.getMonth()+1, selDay=currentDate.getDate();
  document.getElementById('cum-title').textContent='水揚げ累計　〜'+selMonth+'/'+selDay;
  var data=computeCumulative();
  var c=document.getElementById('cum-content');
  if(!data||data.length===0){ c.innerHTML='<div id="cum-empty">表示できる累計データがありません</div>'; return; }
  var maxQty=0; data.forEach(function(d){ if(d.qty>maxQty)maxQty=d.qty; }); if(maxQty<=0)maxQty=1;

  var html='<div class="cum-card"><div class="cum-card-head">シーズン比較（'+selMonth+'/'+selDay+'時点の累計）</div><div class="cum-card-body">';
  data.forEach(function(d,i){
    var pct=Math.round(d.qty/maxQty*100);
    var priceStr=(d.price==null?'—':Number(d.price).toLocaleString());
    html+='<div class="cum-season'+(d.isCurrent?' current':'')+'">';
    html+='<div class="cum-season-top"><span class="cum-season-year">'+d.year+(d.isCurrent?' <span style="font-size:12px;">今年</span>':'')+'</span><span class="cum-season-price">'+priceStr+' <span style="font-size:12px;font-weight:normal;">円/kg</span></span></div>';
    html+='<div class="cum-bar-row"><span class="cum-qty">'+tons(d.qty)+' t</span><span class="cum-bar-track"><span class="cum-bar-fill" style="width:'+pct+'%"></span></span></div>';
    if(d.isCurrent && data[i+1] && data[i+1].price!=null){
      var prev=data[i+1], dq=d.qty-prev.qty, dp=d.price-prev.price;
      var dpct=prev.qty>0?Math.round(dq/prev.qty*100):0;
      html+='<div class="cum-delta">前年同期比　数量 '+(dq>=0?'+':'−')+tons(Math.abs(dq))+'t('+(dpct>=0?'+':'')+dpct+'%)　単価 '+(dp>=0?'+':'−')+Math.abs(dp)+'円</div>';
    }
    html+='</div>';
  });
  html+='</div></div>';

  data.forEach(function(d){
    html+='<div class="cum-card"><div class="cum-detail-year">'+d.year+'年シーズン</div>';
    html+='<table class="cum-month"><colgroup><col style="width:40%"><col style="width:30%"><col style="width:30%"></colgroup><thead><tr><th>月</th><th>数量</th><th>平均単価</th></tr></thead><tbody>';
    d.months.forEach(function(m){
      var label=m.month+'月'+(m.month===selMonth?'<span style="font-size:11px;">('+selDay+'日まで)</span>':'');
      var pr=(m.price==null?'—':Number(m.price).toLocaleString()+'円');
      html+='<tr><td>'+label+'</td><td>'+tons(m.qty)+' t</td><td>'+pr+'</td></tr>';
    });
    var pr=(d.price==null?'—':Number(d.price).toLocaleString()+'円');
    html+='<tr class="cum-total"><td>累計</td><td>'+tons(d.qty)+' t</td><td>'+pr+'</td></tr>';
    html+='</tbody></table></div>';
  });
  html+='<div class="cum-note">数量はトン表示（1t=1,000kg）。平均単価は累計の金額÷数量。各シーズンの選択月は'+selDay+'日までの集計です。</div>';
  c.innerHTML=html;
}

document.getElementById('btn-cum').addEventListener('click',function(){
  document.getElementById('cum-content').innerHTML='<div id="cum-empty">読み込み中...</div>';
  document.getElementById('cumulative-page').style.display='block';
  document.getElementById('cumulative-page').scrollTop=0;
  fetchAllData(function(){ renderCumulative(); document.getElementById('cumulative-page').scrollTop=0; });
});

  document.getElementById('cumulative-page').style.display='none';
});

updateDateDisplay();
loadData();
</script>
